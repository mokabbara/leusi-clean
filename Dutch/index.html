@media(max-width:640px){.flash .big{font-size:1.4rem}.card{padding:15px}}

let S={xp:0,streak:0,lastDay:"",srs:{},dailyDone:"",meetDone:{},missDone:{}};
try{const raw=localStorage.getItem("wwtrainer");if(raw)S=Object.assign(S,JSON.parse(raw));}catch(e){}
function save(){try{localStorage.setItem("wwtrainer",JSON.stringify(S));}catch(e){}}
function today(){return new Date().toISOString().slice(0,10);}
function touchStreak(){const t=today();if(S.lastDay===t)return;const y=new Date(Date.now()-864e5).toISOString().slice(0,10);S.streak=(S.lastDay===y)?S.streak+1:1;S.lastDay=t;save();}
function addXP(n){S.xp+=n;touchStreak();save();paintHeader();}
function paintHeader(){document.getElementById("xp").textContent=S.xp;document.getElementById("streak").textContent=S.streak;let r=RANKS[0][1];for(const[t,n]of RANKS)if(S.xp>=t)r=n;document.getElementById("rank").textContent=r;}
const D=window.VDATA;
const byCat={};D.forEach(w=>{(byCat[w.c]=byCat[w.c]||[]).push(w);});
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function nlEn(s){const i=s.indexOf("|");return[s.slice(0,i),s.slice(i+1)];}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

  <b>Vormen:</b> ${esc(w.f)}<br>
  <b>Voorbeeld:</b> <span class="nl">${esc(sn)}</span> — ${esc(se)}<br>
  <b>Professioneel:</b> <span class="nl">${esc(pn)}</span> — ${esc(pe)}<br>
  <b>Werkfrase:</b> ${esc(w.w)}<br>

}

function dueWords(){const t=today();return D.filter(w=>{const r=S.srs[w.n];return!r||r.due<=t;});}
let fc={queue:[],idx:0,flipped:false,mode:"due"};
VIEWS.flash=()=>{
  main.innerHTML=`<div class="card"><h2>🃏 Flashcards · Level 1</h2>
  <p class="muted">Spaced repetition: woorden komen terug op het juiste moment. Klik op de kaart om te draaien.</p>
  <div class="row" style="margin:10px 0">
    <button class="btn small" onclick="startFlash('due')">Te herhalen (${dueWords().length})</button>
    <select id="fcat" style="background:#131a2a;color:var(--text);border:1px solid var(--line);border-radius:10px;padding:8px">${Object.entries(CATS).map(([id,c])=>`<option value="${id}">${c.icon} ${c.label}</option>`).join("")}</select>
    <button class="btn small sec" onclick="startFlash(document.getElementById('fcat').value)">Oefen categorie</button>
  </div><div id="fcarea"></div></div>`;
  startFlash("due");
};
window.startFlash=mode=>{
  fc.mode=mode;fc.idx=0;fc.flipped=false;
  fc.queue=shuffle(mode==="due"?dueWords():byCat[mode]||[]).slice(0,20);
  paintFlash();
};
function paintFlash(){
  const a=document.getElementById("fcarea");if(!a)return;
  if(!fc.queue.length){a.innerHTML="<p class='muted'>🎉 Niets te herhalen. Kies een categorie of kom morgen terug.</p>";return;}
  if(fc.idx>=fc.queue.length){a.innerHTML=`<p class='muted'>✅ Sessie klaar — ${fc.queue.length} kaarten geoefend.</p><button class="btn" onclick="startFlash(fc.mode)">Nog een ronde</button>`;return;}
  const w=fc.queue[fc.idx];
  a.innerHTML=`<div class="progressline"><i style="width:${Math.round(100*fc.idx/fc.queue.length)}%"></i></div>
  <div class="flash" onclick="flipFC()">${fc.flipped?
    `<div class="detail">${detailHTML(w)}</div>`:
    `<div class="type">${w.t} · ${CATS[w.c].icon} ${CATS[w.c].label}</div><div class="big">${esc(w.n)}</div><p class="muted">Wat betekent dit? Hoe vervoeg je het? Klik om te draaien.</p>`}
  </div>
  ${fc.flipped?`<div class="row" style="margin-top:10px">
    <button class="btn sec" onclick="gradeFC(0)">😵 Opnieuw</button>
    <button class="btn sec" onclick="gradeFC(1)">🙂 Goed (+2 XP)</button>
    <button class="btn" onclick="gradeFC(2)">😎 Makkelijk (+2 XP)</button></div>`:""}`;
}
window.flipFC=()=>{fc.flipped=!fc.flipped;paintFlash();};
window.gradeFC=g=>{
  const w=fc.queue[fc.idx];const r=S.srs[w.n]||{box:0,due:today()};
  r.box=g===0?1:Math.min(r.box+(g===2?2:1),6);
  const d=new Date(Date.now()+SRS_DAYS[r.box]*864e5);r.due=d.toISOString().slice(0,10);
  S.srs[w.n]=r;if(g>0)addXP(2);save();
  fc.idx++;fc.flipped=false;paintFlash();
};

let qz={q:null,score:0,n:0};
VIEWS.quiz=()=>{
  main.innerHTML=`<div class="card"><h2>✅ Kies het juiste woord · Level 2</h2>
  <p class="muted">Echte werkzinnen uit energie- en adviespraktijk. Kies het woord dat past.</p>
  <p class="muted" id="qscore"></p><div id="qarea"></div></div>`;
  nextQuiz();
};
function makeCloze(w){
  const[pn,pe]=nlEn(w.p);
  const head=w.n.replace(/^(de|het)\s+/,"");
  const cands=[head,...w.f.split(/[,;()\/]/).map(x=>x.trim()).filter(x=>x&&!x.includes(" ")&&x.length>3)];
  const words=pn.split(/\s+/);
  for(let i=0;i<words.length;i++){
    const clean=words[i].replace(/[.,;:!?'"]/g,"").toLowerCase();
    for(const c of cands){
      if(clean===c.toLowerCase()||(clean.length>4&&c.length>4&&clean.startsWith(c.slice(0,Math.min(c.length,6)).toLowerCase()))){
        const blanked=words.slice();const answer=words[i].replace(/[.,;:!?'"]/g,"");
        blanked[i]=words[i].replace(answer,"_____");
        return{sentence:blanked.join(" "),answer,en:pe};
      }
    }
  }
  return null;
}
function nextQuiz(){
  const w=pick(D);
  const cloze=Math.random()<0.6?makeCloze(w):null;
  const pool=shuffle(D.filter(x=>x.t===w.t&&x.n!==w.n)).slice(0,3);
  if(cloze){
    const opts=shuffle([{t:cloze.answer,ok:true},...pool.map(p=>{const c2=makeCloze(p);return{t:c2?c2.answer:p.n.replace(/^(de|het)\s+/,""),ok:false};})]);
    qz.q={w,type:"cloze",cloze,opts};
  }else{
    const opts=shuffle([{t:w.n,ok:true},...pool.map(p=>({t:p.n,ok:false}))]);
    qz.q={w,type:"mean",opts};
  }
  paintQuiz();
}
function paintQuiz(){
  const{w,type,cloze,opts}=qz.q;
  document.getElementById("qscore").textContent=qz.n?`Score: ${qz.score}/${qz.n}`:"";
  document.getElementById("qarea").innerHTML=`
  <h3>${type==="cloze"?"Vul in:":"Welk woord betekent: <i>"+esc(w.e)+"</i>?"}</h3>
  ${type==="cloze"?`<p style="font-size:1.05rem;line-height:1.6" class="nl">${esc(cloze.sentence)}</p><p class="muted">${esc(cloze.en)}</p>`:""}
  ${opts.map((o,i)=>`<button class="opt" id="opt${i}" onclick="ansQuiz(${i})">${esc(o.t)}</button>`).join("")}
  <div class="feedback" id="qfb"></div><div id="qnext"></div>`;
}
window.ansQuiz=i=>{
  const{opts,w}=qz.q;qz.n++;
  opts.forEach((o,j)=>{const b=document.getElementById("opt"+j);b.disabled=true;if(o.ok)b.classList.add("correct");else if(j===i)b.classList.add("wrong");});
  const fb=document.getElementById("qfb");
  if(opts[i].ok){qz.score++;addXP(3);fb.className="feedback ok";fb.innerHTML=`✔ Juist! <b>${esc(w.n)}</b> — ${esc(w.e)}.<br>🧠 ${esc(w.h)}`;}
  else{fb.className="feedback no";fb.innerHTML=`✘ Het juiste antwoord: <b>${esc(w.n)}</b> — ${esc(w.e)}.<br>⚠️ ${esc(w.m)}`;}
  document.getElementById("qnext").innerHTML=`<button class="btn" style="margin-top:10px" onclick="nextQuiz()">Volgende →</button>`;
};

let bt={idx:0,order:[]};
VIEWS.battle=()=>{
  bt.order=shuffle(BATTLES.map((_,i)=>i));bt.idx=0;
  main.innerHTML=`<div class="card"><h2>⚔️ Woordduel · verwarringstest</h2>

  <div id="btarea"></div></div>`;
  paintBattle();
};
function paintBattle(){
  const a=document.getElementById("btarea");
  if(bt.idx>=bt.order.length){a.innerHTML=`<p class='muted'>🏆 Duel voltooid!</p><button class="btn" onclick="VIEWS.battle()">Opnieuw</button>`;return;}
  const q=BATTLES[bt.order[bt.idx]];
  const opts=shuffle([{t:q.a,ok:true},{t:q.b,ok:false}]);
  a.innerHTML=`<div class="progressline"><i style="width:${Math.round(100*bt.idx/bt.order.length)}%"></i></div>

  ${opts.map((o,i)=>`<button class="opt" id="bopt${i}" onclick="ansBattle(${i},${o.ok})">${esc(o.t)}</button>`).join("")}
  <div class="feedback" id="bfb"></div><div id="bnext"></div>`;
  window._bopts=opts;window._bq=q;
}
window.ansBattle=(i,ok)=>{
  window._bopts.forEach((o,j)=>{const b=document.getElementById("bopt"+j);b.disabled=true;if(o.ok)b.classList.add("correct");else if(j===i)b.classList.add("wrong");});
  const fb=document.getElementById("bfb");
  if(ok){addXP(5);fb.className="feedback ok";fb.innerHTML="✔ +5 XP · "+esc(window._bq.x);}
  else{fb.className="feedback no";fb.innerHTML="✘ "+esc(window._bq.x);}
  document.getElementById("bnext").innerHTML=`<button class="btn" style="margin-top:10px" onclick="bt.idx++;paintBattle()">Volgende ronde →</button>`;
};

{id:"m2",title:"🏛️ Stuurgroep: provincie & netbeheerder tegenover elkaar",intro:"Je begeleidt een stuurgroep. De provincie wil dat een nieuw bedrijventerrein voorrang krijgt; de netbeheerder wijst op de wachtrij. De sfeer is gespannen.",
steps:[
{npc:"Gedeputeerde: 'Dit terrein is cruciaal voor de regionale economie. Ik verwacht gewoon dat het wordt aangesloten. Punt.'",
opts:[
{t:"'Ik constateer dat er twee legitieme belangen botsen: regionale groei en een eerlijke wachtrij. Zullen we eerst het afwegingskader benoemen voordat we over individuele gevallen spreken?'",best:true,fb:"'Ik constateer' de-escaleert, en je tilt het gesprek naar het afwegingskader — klassiek goed procesbegeleiderschap."},
{t:"'De regels zijn de regels, de netbeheerder kan niets doen.'",best:false,fb:"Je maakt jezelf overbodig én kiest partij. Benoem het spanningsveld in plaats van een kant te kiezen."},
{t:"'Punt genoteerd. Volgende agendapunt.'",best:false,fb:"Conflictvermijding lost niets op — het conflict komt terug, groter."}]},
{npc:"Netbeheerder: 'Wij mógen niet eens voorrang geven. Non-discriminatie is wettelijk vastgelegd.'",
opts:[
{t:"'Klopt, dat kader geldt. Tegelijk biedt de nieuwe regelgeving ruimte om maatschappelijke prioriteiten mee te wegen. Ik stel voor dat wij die ruimte in kaart brengen en volgende maand terugkoppelen.'",best:true,fb:"Je erkent het wettelijk kader ('dat kader geldt'), opent perspectief én maakt het concreet met 'terugkoppelen'."},
{t:"'Wetten kunnen worden aangepast, dat is politiek.'",best:false,fb:"Te makkelijk en buiten je rol — de doorlooptijd van wetswijziging helpt deze casus niet."},
{t:"'Dan houdt het hier dus op.'",best:false,fb:"Een adviseur die 'dan houdt het op' zegt, wordt niet teruggevraagd. Zoek de ruimte binnen het kader."}]},
{npc:"Gedeputeerde: 'Mooi. Maar ik wil geen vrijblijvend praatstuk. Wat krijg ik precies?'",
opts:[
{t:"'Een concreet afwegingskader, getoetst aan de regelgeving, met per knelpunt een maatregelenpakket. Niet vrijblijvend: elke actie gekoppeld aan een eigenaar en een datum. Oplevering: 15 mei.'",best:true,fb:"Muziek in bestuurlijke oren: 'getoetst aan', 'maatregelenpakket', 'niet vrijblijvend', 'gekoppeld aan', harde datum."},
{t:"'Een uitgebreid rapport van zo'n tachtig pagina's.'",best:false,fb:"Niemand vroeg om pagina's. Beschrijf waarde en bruikbaarheid, geen omvang."},
{t:"'Dat hangt af van hoe het loopt.'",best:false,fb:"Precies het vrijblijvende antwoord waar ze bang voor was."}]}]},
{id:"m3",title:"🎤 Sollicitatiegesprek: senior adviseur energie",intro:"Je solliciteert bij een adviesbureau op een rol in energie-infrastructuur en CCUS. Tegenover je: een partner en een senior adviseur.",
steps:[
{npc:"Partner: 'Vertel eens — wat zijn uw belangrijkste drijfveren?'",
opts:[
{t:"'Mijn belangrijkste drijfveer is een concrete bijdrage leveren aan de energietransitie. Ik werk graag op het snijvlak van techniek, beleid en uitvoering — precies waar netcongestie en CCUS spelen.'",best:true,fb:"Sterk: 'drijfveer', 'bijdrage leveren', 'snijvlak' — en direct gekoppeld aan hun praktijk."},
{t:"'Ik zoek vooral een goed salaris en een leaseauto.'",best:false,fb:"Eerlijk, maar dit beantwoordt de vraag naar intrinsieke motivatie niet. Bewaar arbeidsvoorwaarden voor later."},
{t:"'Tja, gewoon... interessant werk doen?'",best:false,fb:"'Gewoon' en een vraagteken — te vaag. Bereid drie concrete drijfveren voor."}]},
{npc:"Senior: 'Hoe gaat u om met een klant die uw advies naast zich neerlegt?'",
opts:[
{t:"'Dat is uiteindelijk zijn goed recht. Ik toets eerst of ik het probleem goed heb begrepen, licht mijn onderbouwing nader toe, en benoem expliciet de risico's van het alternatief. Daarna leg ik de keuze vast, zodat die niet vrijblijvend blijft.'",best:true,fb:"Volwassen antwoord: toetsen, toelichten, benoemen, vastleggen — respect voor de klant én ruggengraat."},
{t:"'Dan dring ik aan tot hij het toch doet.'",best:false,fb:"Drammen ondermijnt de relatie. Overtuigen doe je met onderbouwing, niet met volume."},
{t:"'Dan is dat zijn probleem, ik heb mijn werk gedaan.'",best:false,fb:"Een leverancier zegt dit. Een sparringpartner blijft betrokken bij het resultaat."}]},
{npc:"Partner: 'Waarmee onderscheidt u zich van de tien andere kandidaten?'",
opts:[
{t:"'Ik combineer inhoudelijke diepgang op netcongestie en CCUS met ervaring in bestuurlijke afstemming. Die vertaalslag — van techniek naar besluitvorming — is precies waar ik mij onderscheid.'",best:true,fb:"'Inhoudelijke diepgang', 'vertaalslag', 'onderscheiden' — je gebruikt de taal van hun eigen offertes."},
{t:"'Ik ben een harde werker en een teamspeler.'",best:false,fb:"Zegt iedereen. Onderscheidend vermogen vraagt om iets specifieks en aantoonbaars."},
{t:"'Geen idee, dat moet u beoordelen.'",best:false,fb:"Bescheidenheid is mooi, maar dit is de kans om je kracht te benoemen. Bereid deze vraag altijd voor."}]}]}];
VIEWS.meeting=()=>{
  main.innerHTML=`<div class="card"><h2>🎭 Vergadersimulatie · Level 4</h2>
  <p class="muted">Kies wat jij zou zeggen. Beste keuze = +5 XP. Let op de vetgedrukte feedback: dáár zit de taal-les.</p></div>`+
  MEETINGS.map(m=>`<div class="card"><h3>${m.title} ${S.meetDone[m.id]?'<span class="badge">voltooid</span>':''}</h3>
  <p class="muted">${m.intro}</p><button class="btn small" onclick="startMeet('${m.id}')">Start gesprek</button>
  <div id="meet_${m.id}"></div></div>`).join("");
};
window.startMeet=id=>{const m=MEETINGS.find(x=>x.id===id);m._step=0;paintMeet(m);};
function paintMeet(m){
  const box=document.getElementById("meet_"+m.id);
  if(m._step>=m.steps.length){S.meetDone[m.id]=true;save();box.innerHTML+=`<div class="feedback ok" style="display:block;margin-top:10px">🎉 Gesprek voltooid! Herhaal het morgen — dan pas beklijft het.</div>`;return;}
  const st=m.steps[m._step];
  const opts=shuffle(st.opts.map((o,i)=>({...o,i})));
  box.innerHTML=`<div class="dialog"><div class="who">Gesprekspartner</div>${esc(st.npc)}</div>
  <p class="muted" style="margin:6px 0">Jouw reactie:</p>
  ${opts.map((o,k)=>`<button class="opt" id="mo${k}" onclick="ansMeet('${m.id}',${k})">${esc(o.t)}</button>`).join("")}
  <div class="feedback" id="mfb_${m.id}"></div><div id="mnext_${m.id}"></div>`;
  m._opts=opts;
}
window.ansMeet=(id,k)=>{
  const m=MEETINGS.find(x=>x.id===id);const o=m._opts[k];
  m._opts.forEach((x,j)=>{const b=document.getElementById("mo"+j);b.disabled=true;if(x.best)b.classList.add("correct");else if(j===k)b.classList.add("wrong");});
  const fb=document.getElementById("mfb_"+id);
  fb.className="feedback "+(o.best?"ok":"no");fb.innerHTML=(o.best?"✔ +5 XP · ":"✘ ")+esc(o.fb);
  if(o.best)addXP(5);else addXP(1);
  document.getElementById("mnext_"+id).innerHTML=`<button class="btn small" style="margin-top:8px" onclick="const m=MEETINGS.find(x=>x.id==='${id}');m._step++;paintMeet(m)">Verder →</button>`;
};

VIEWS.mission=()=>{

// ============ DAILY MISSION ============
VIEWS.daily=()=>{
  const seed=today();let h=0;for(const c of seed)h=(h*31+c.charCodeAt(0))>>>0;
  const w1=D[h%D.length],w2=D[(h*7+3)%D.length],w3=D[(h*13+5)%D.length];
  const done=S.dailyDone===seed;
  main.innerHTML=`<div class="card"><h2>📅 Dagmissie — ${seed} ${done?'<span class="badge">voltooid</span>':''}</h2>
  <p class="muted">Tien minuten per dag verslaat drie uur per maand. Vandaag draait om deze drie woorden:</p>
  ${[w1,w2,w3].map(w=>`<div class="wordrow open"><div class="head"><span><b>${esc(w.n)}</b> <span class="pill">${w.t}</span></span><span class="en">${esc(w.e)}</span></div><div class="body">${detailHTML(w)}</div></div>`).join("")}
  <h3>Jouw missie van vandaag</h3>
  <p class="muted">1. 🃏 Doe je flashcards (tab Flashcards → 'Te herhalen').<br>
  2. 🎤 <b>Spreek</b>: neem jezelf 60 seconden op (telefoon) terwijl je een projectupdate geeft met alle drie de woorden.<br>
  3. ✍️ <b>Schrijf</b> hieronder één professionele e-mailzin per woord.<br>
  4. ⚔️ Speel één rondje Woordduel.</p>
  <textarea placeholder="Zin 1 met ${esc(w1.n)}…&#10;Zin 2 met ${esc(w2.n)}…&#10;Zin 3 met ${esc(w3.n)}…"></textarea>
  <button class="btn" ${done?"disabled":""} onclick="S.dailyDone='${seed}';save();addXP(15);VIEWS.daily()">Missie voltooid (+15 XP)</button>
  </div>`;
};
